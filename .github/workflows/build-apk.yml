name: Build Jarvis APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Preserve our source files
        run: |
          mkdir -p /tmp/backup
          cp -r lib /tmp/backup/lib
          cp pubspec.yaml /tmp/backup/pubspec.yaml

      - name: Generate Android platform scaffold (only if missing)
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.jarvis --project-name jarvis_app .
          fi

      - name: Restore our source files
        run: |
          cp -r /tmp/backup/lib .
          cp /tmp/backup/pubspec.yaml .

      - name: Add microphone permission to manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "RECORD_AUDIO" "$MANIFEST"; then
            sed -i 's/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">\n    <uses-permission android:name="android.permission.RECORD_AUDIO" \/>\n    <uses-permission android:name="android.permission.INTERNET" \/>/' "$MANIFEST"
          fi
          cat "$MANIFEST"

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-apk
          path: build/app/outputs/flutter-apk/app-release.apk
