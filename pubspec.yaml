name: jarvis_app
description: A personal voice AI assistant.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  http: ^1.2.1
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  android_intent_plus: ^5.0.0
  flutter_foreground_task: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
